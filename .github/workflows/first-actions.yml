name: Node.js ci
on: [push]
jobs:
  build:
   runs-on: self-hosted
   defaults:
      run:
        working-directory: my-calendar
   strategy:
     matrix:
       node-version: ["22.22.0"]
   steps:
     - uses: actions/checkout@v6
     - name: Use Node.js
       uses: actions/setup-node@v4
       with:
         node-version: "22.22.0"
     - run: npm ci
     - run: npm run build --if-present
